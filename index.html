<!DOCTYPE HTML>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.5.2/peerjs.min.js"></script>
    <style>
        :root { --bg: #ffffff; --text: #1c1c1e; --accent: #34c759; --danger: #ff3b30; --gray: #f2f2f7; --sub: #8e8e93; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; overflow: hidden; }

        /* ヘッダー */
        header { padding: 20px; border-bottom: 1px solid #eee; background: #fff; position: sticky; top: 0; z-index: 10; }
        .my-num-display { font-size: 12px; color: var(--sub); margin-top: 5px; }

        /* 連絡先リスト */
        .contact-list { height: calc(100vh - 100px); overflow-y: auto; padding-bottom: 100px; }
        .contact-item { 
            display: flex; align-items: center; padding: 15px 20px; border-bottom: 1px solid #f9f9f9;
            cursor: pointer; transition: background 0.2s;
        }
        .contact-item:active { background: var(--gray); }
        .avatar { 
            width: 45px; height: 45px; background: #e1e1e6; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; color: #fff; font-size: 20px; margin-right: 15px;
        }
        .contact-info { text-align: left; flex-grow: 1; }
        .contact-name { font-weight: 500; font-size: 17px; }
        .contact-number { color: var(--sub); font-size: 13px; }

        /* フローティング発信ボタン */
        .fab {
            position: fixed; bottom: 30px; right: 30px; 
            width: 65px; height: 65px; background: #007aff; color: white;
            border-radius: 18px; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 8px 20px rgba(0,122,255,0.3); z-index: 100; border: none;
        }

        /* キーパッドモーダル */
        #keypad-modal {
            position: fixed; bottom: -100%; left: 0; width: 100%; height: 80%;
            background: #fff; border-radius: 30px 30px 0 0; box-shadow: 0 -10px 40px rgba(0,0,0,0.1);
            transition: bottom 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 200;
            display: flex; flex-direction: column; align-items: center; padding-top: 20px;
        }
        #keypad-modal.open { bottom: 0; }
        .keypad-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-top: 20px; }
        .key { 
            width: 75px; height: 75px; border-radius: 50%; background: var(--gray);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-size: 28px; font-weight: 400; cursor: pointer;
        }
        .key:active { background: #e5e5ea; }
        .key span { font-size: 10px; color: var(--sub); margin-top: -5px; }

        /* 通話画面（フルスクリーン） */
        .full-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #fff; display: none; flex-direction: column; align-items: center; justify-content: space-around; z-index: 1000;
        }
        .circle-btn { width: 75px; height: 75px; border-radius: 50%; border: none; color: white; display: flex; align-items: center; justify-content: center; font-size: 32px; }
    </style>
</head>
<body>

    <header>
        <div style="font-size: 24px; font-weight: bold;">連絡先</div>
        <div class="my-num-display">マイ番号: <span id="my-number">準備中...</span></div>
    </header>

    <div class="contact-list" id="contact-list">
        <div class="contact-item" onclick="makeCall('01-1234', '田中 太郎')">
            <div class="avatar" style="background:#5856d6;">田</div>
            <div class="contact-info">
                <div class="contact-name">田中 太郎</div>
                <div class="contact-number">01-1234</div>
            </div>
            <span class="material-symbols-outlined" style="color:var(--accent);">call</span>
        </div>
        </div>

    <button class="fab" onclick="toggleKeypad(true)">
        <span class="material-symbols-outlined" style="font-size: 35px;">dialpad</span>
    </button>

    <div id="keypad-modal">
        <div style="width: 40px; height: 5px; background: #ddd; border-radius: 10px; margin-bottom: 20px;" onclick="toggleKeypad(false)"></div>
        <div id="dial-display" style="font-size: 35px; height: 50px; margin-bottom: 20px; letter-spacing: 2px;"></div>
        
        <div class="keypad-grid">
            <div class="key" onclick="pressKey('1')">1<span> </span></div>
            <div class="key" onclick="pressKey('2')">2<span>ABC</span></div>
            <div class="key" onclick="pressKey('3')">3<span>DEF</span></div>
            <div class="key" onclick="pressKey('4')">4<span>GHI</span></div>
            <div class="key" onclick="pressKey('5')">5<span>JKL</span></div>
            <div class="key" onclick="pressKey('6')">6<span>MNO</span></div>
            <div class="key" onclick="pressKey('7')">7<span>PQRS</span></div>
            <div class="key" onclick="pressKey('8')">8<span>TUV</span></div>
            <div class="key" onclick="pressKey('9')">9<span>WXYZ</span></div>
            <div class="key" onclick="pressKey('*')">*</div>
            <div class="key" onclick="pressKey('0')">0<span>+</span></div>
            <div class="key" onclick="pressKey('#')">#</div>
        </div>
        
        <div style="margin-top: 30px; display: flex; align-items: center; gap: 40px;">
            <span class="material-symbols-outlined" style="visibility:hidden;">backspace</span>
            <button class="circle-btn" style="background:var(--accent);" onclick="startDialCall()">
                <span class="material-symbols-outlined">call</span>
            </button>
            <span class="material-symbols-outlined" style="color:var(--sub); cursor:pointer;" onclick="pressKey('back')">backspace</span>
        </div>
    </div>

    <div id="call-overlay" class="full-screen">
        <div style="margin-top: 60px;">
            <div id="active-name" style="font-size: 32px;">不明な発信者</div>
            <div id="active-number" style="color:var(--sub); font-size: 18px; margin-top:5px;">01-0000</div>
            <div id="timer" style="font-size: 20px; margin-top: 15px; color: var(--accent); display:none;">00:00</div>
        </div>

        <div id="in-call-controls" style="display:grid; grid-template-columns: repeat(3, 1fr); gap: 30px; width: 80%;">
            <div onclick="toggleMute()"><span id="m-ic" class="material-symbols-outlined icon-btn">mic_off</span></div>
            <div onclick="toggleHold()"><span id="h-ic" class="material-symbols-outlined icon-btn">pause</span></div>
            <div onclick="toggleSpeaker()"><span id="s-ic" class="material-symbols-outlined icon-btn">volume_up</span></div>
        </div>

        <div style="display:flex; gap: 60px; margin-bottom: 80px;" id="call-actions">
            <button id="btn-decline" class="circle-btn" style="background:var(--danger);" onclick="endCall()">
                <span class="material-symbols-outlined">call_end</span>
            </button>
            <button id="btn-answer" class="circle-btn" style="background:var(--accent); display:none;" onclick="answerCall()">
                <span class="material-symbols-outlined">call</span>
            </button>
        </div>
    </div>

<script>
    let peer, localStream, currentCall, timerInterval;
    let dialString = "";
    const ringtone = new Audio("ring.mp3");
    const dialtone = new Audio("dialtone.mp3");
    ringtone.loop = dialtone.loop = true;

    const myId = localStorage.getItem('nnm_phone_num') || "01-" + Math.floor(Math.random()*9000+1000);
    localStorage.setItem('nnm_phone_num', myId);

    window.onload = async () => {
        document.getElementById('my-number').innerText = myId;
        localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
        initPeer();
    };

    function initPeer() {
        peer = new Peer(myId, { debug: 1, config: { iceServers: [{ urls: "stun:stun.l.google.com:19302" }] } });
        peer.on('call', call => {
            currentCall = call;
            showCallOverlay(call.peer, "着信中...", true);
            ringtone.play();
        });
    }

    function toggleKeypad(show) {
        document.getElementById('keypad-modal').classList.toggle('open', show);
        if(!show) { dialString = ""; updateDialDisplay(); }
    }

    function pressKey(k) {
        if(k === 'back') dialString = dialString.slice(0, -1);
        else if(dialString.length < 10) dialString += k;
        updateDialDisplay();
    }

    function updateDialDisplay() {
        document.getElementById('dial-display').innerText = dialString;
    }

    function makeCall(number, name = "不明な発信者") {
        dialtone.play();
        currentCall = peer.call(number, localStream);
        showCallOverlay(number, name);
        setupCallEvents(currentCall);
    }

    function startDialCall() {
        if(!dialString) return;
        makeCall(dialString);
        toggleKeypad(false);
    }

    function showCallOverlay(number, name, isIncoming = false) {
        document.getElementById('active-number').innerText = number;
        document.getElementById('active-name').innerText = name;
        document.getElementById('call-overlay').style.display = 'flex';
        document.getElementById('btn-answer').style.display = isIncoming ? 'flex' : 'none';
    }

    function answerCall() {
        ringtone.pause();
        currentCall.answer(localStream);
        document.getElementById('btn-answer').style.display = 'none';
        setupCallEvents(currentCall);
    }

    function setupCallEvents(call) {
        call.on('stream', stream => {
            dialtone.pause();
            document.getElementById('timer').style.display = 'block';
            const audio = document.createElement('audio');
            audio.srcObject = stream; audio.autoplay = true;
            document.body.appendChild(audio);
            startTimer();
        });
        call.on('close', endCall);
    }

    function endCall() {
        ringtone.pause(); dialtone.pause();
        if(currentCall) currentCall.close();
        document.getElementById('call-overlay').style.display = 'none';
        clearInterval(timerInterval);
        document.getElementById('timer').innerText = "00:00";
    }

    function startTimer() {
        let sec = 0;
        timerInterval = setInterval(() => {
            sec++;
            let m = Math.floor(sec/60).toString().padStart(2,'0');
            let s = (sec%60).toString().padStart(2,'0');
            document.getElementById('timer').innerText = `${m}:${s}`;
        }, 1000);
    }
</script>
</body>
</html>
