<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>NNM Voice</title>

<link rel="manifest" href="manifest.json">
<script src="https://cdn.jsdelivr.net/npm/skyway-js@4.4.0/dist/skyway.min.js"></script>

<style>
body{
  font-family:sans-serif;
  text-align:center;
  background:#111;
  color:white;
}
input,button{
  padding:10px;
  margin:5px;
  border-radius:8px;
  border:none;
}
button{
  background:#0a84ff;
  color:white;
}
#controls{ margin-top:20px; }
.hidden{ display:none; }
.popup{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.8);
  display:flex;
  align-items:center;
  justify-content:center;
}
.popup-box{
  background:#222;
  padding:20px;
  border-radius:12px;
}
</style>
</head>

<body>

<h2>NNM Voice</h2>

<input id="myId" placeholder="自分のID">
<button onclick="init()">接続</button>

<hr>

<input id="targetId" placeholder="相手ID">
<button onclick="makeCall()">発信</button>

<div id="controls" class="hidden">
  <button onclick="toggleMute()">ミュート</button>
  <button onclick="endCall()">通話終了</button>
</div>

<div id="incoming" class="popup hidden">
  <div class="popup-box">
    <p>着信中...</p>
    <button onclick="answerCall()">応答</button>
    <button onclick="rejectCall()">拒否</button>
  </div>
</div>

<audio id="remoteAudio" autoplay></audio>

<script>
const API_KEY = "9b4c7b2b-b827-440f-94fb-f4925b77fd21";

let peer;
let localStream;
let currentCall;
let muted = false;

async function init(){
  const myId = document.getElementById("myId").value;

  peer = new Peer(myId,{ key:API_KEY });

  localStream = await navigator.mediaDevices.getUserMedia({ audio:true });

  peer.on("call", call=>{
    currentCall = call;
    document.getElementById("incoming").classList.remove("hidden");
  });
}

function makeCall(){
  const targetId = document.getElementById("targetId").value;
  currentCall = peer.call(targetId, localStream);
  setupCall();
}

function answerCall(){
  currentCall.answer(localStream);
  setupCall();
  document.getElementById("incoming").classList.add("hidden");
}

function rejectCall(){
  currentCall.close();
  document.getElementById("incoming").classList.add("hidden");
}

function setupCall(){
  currentCall.on("stream", stream=>{
    document.getElementById("remoteAudio").srcObject = stream;
  });
  document.getElementById("controls").classList.remove("hidden");
}

function toggleMute(){
  muted = !muted;
  localStream.getAudioTracks()[0].enabled = !muted;
  alert(muted ? "ミュートON" : "ミュートOFF");
}

function endCall(){
  currentCall.close();
  document.getElementById("controls").classList.add("hidden");
}
</script>

<script>
if("serviceWorker" in navigator){
  navigator.serviceWorker.register("sw.js");
}
</script>

</body>
</html>
