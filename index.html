<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>NNM LINK</title>
<meta name="viewport" content="width=device-width,initial-scale=1">

<link rel="manifest" href="manifest.json">

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#e6f4ea;
  text-align:center;
}

.screen{
  display:none;
  height:100vh;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

.active{
  display:flex;
}

.btn{
  width:90px;
  height:90px;
  border-radius:50%;
  border:none;
  font-size:28px;
  margin:20px;
  color:white;
}

.accept{ background:#00c853; }
.reject{ background:#d50000; }
.end{ background:#d50000; }
.call{ background:#00c853; }

input{
  padding:10px;
  font-size:18px;
}
</style>
</head>

<body>

<!-- ログイン -->
<div id="loginScreen" class="screen active">
  <h2>NNM LINK</h2>
  <button onclick="login()">Googleでログイン</button>
</div>

<!-- メイン -->
<div id="mainScreen" class="screen">
  <h2 id="userName"></h2>
  <input id="targetUid" placeholder="相手UID">
  <button class="btn call" onclick="startCall()">📞</button>
</div>

<!-- 着信 -->
<div id="incomingScreen" class="screen">
  <h2>着信中</h2>
  <button class="btn accept" onclick="answerCall()">📞</button>
  <button class="btn reject" onclick="endCall()">❌</button>
</div>

<!-- 通話中 -->
<div id="callScreen" class="screen">
  <h2>通話中</h2>
  <button class="btn end" onclick="endCall()">📞</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged }
from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc, onSnapshot, collection, addDoc, updateDoc, deleteDoc }
from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "あなたの",
  authDomain: "あなたの",
  projectId: "あなたの",
  storageBucket: "あなたの",
  messagingSenderId: "あなたの",
  appId: "あなたの"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth();
const db = getFirestore();

let currentUser;
let pc;
let localStream;
let currentCallDoc;

function show(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

window.login = async function(){
  const provider = new GoogleAuthProvider();
  await signInWithPopup(auth, provider);
}

onAuthStateChanged(auth,user=>{
  if(user){
    currentUser = user;
    document.getElementById("userName").innerText = user.displayName;
    show("mainScreen");
    listenIncoming();
  }
});

async function listenIncoming(){
  const callsRef = collection(db,"calls");
  onSnapshot(callsRef,snap=>{
    snap.forEach(docSnap=>{
      const data = docSnap.data();
      if(data.to===currentUser.uid && data.status==="ringing"){
        currentCallDoc = docSnap;
        show("incomingScreen");
      }
    });
  });
}

window.startCall = async function(){
  const target = document.getElementById("targetUid").value;
  currentCallDoc = await addDoc(collection(db,"calls"),{
    from:currentUser.uid,
    to:target,
    status:"ringing"
  });
}

window.answerCall = async function(){
  show("callScreen");
  await updateDoc(doc(db,"calls",currentCallDoc.id),{
    status:"accepted"
  });
  startWebRTC(true);
}

window.endCall = async function(){
  show("mainScreen");
  if(currentCallDoc){
    await deleteDoc(doc(db,"calls",currentCallDoc.id));
  }
  if(pc) pc.close();
}

async function startWebRTC(isAnswer){
  pc = new RTCPeerConnection();

  localStream = await navigator.mediaDevices.getUserMedia({audio:true});
  localStream.getTracks().forEach(track=>pc.addTrack(track,localStream));

  if(!isAnswer){
    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);
  }
}

if("serviceWorker" in navigator){
  navigator.serviceWorker.register("service-worker.js");
}

</script>
</body>
</html>
