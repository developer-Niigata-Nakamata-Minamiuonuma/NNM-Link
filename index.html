<!DOCTYPE HTML>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.5.2/peerjs.min.js"></script>
    <style>
        :root { --bg-dark: #121212; --accent: #2ecc71; --danger: #e74c3c; --blue: #3498db; }
        body { font-family: sans-serif; background: var(--bg-dark); color: white; margin: 0; overflow: hidden; text-align: center; }
        
        /* メイン画面 */
        .screen { padding: 40px 20px; display: flex; flex-direction: column; align-items: center; height: 100vh; box-sizing: border-box; }
        .my-number-box { background: #1e1e1e; padding: 20px; border-radius: 20px; border: 1px solid #333; margin: 20px 0; width: 90%; }
        #my-number { font-size: 32px; font-weight: bold; color: var(--accent); letter-spacing: 2px; }
        
        input { width: 80%; padding: 15px; border-radius: 10px; border: 1px solid #444; background: #222; color: white; font-size: 18px; margin-bottom: 15px; text-align: center; }
        .btn { width: 80%; padding: 15px; border-radius: 30px; border: none; font-size: 18px; font-weight: bold; color: white; cursor: pointer; }
        .btn-call { background: var(--accent); }
        .btn-call:disabled { background: #444; color: #888; }

        /* 着信画面（フルスクリーン） */
        #incoming-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #2c3e50 0%, #000000 100%);
            display: none; flex-direction: column; align-items: center; justify-content: space-around;
            z-index: 1000;
        }
        .caller-number { font-size: 40px; font-weight: bold; margin-top: 20px; color: white; }
        .call-actions { display: flex; width: 100%; justify-content: space-around; padding-bottom: 50px; }
        .circle-btn { width: 80px; height: 80px; border-radius: 50%; border: none; color: white; font-size: 30px; display: flex; align-items: center; justify-content: center; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .answer { background: var(--accent); }
        .decline { background: var(--danger); }

        /* 通話中画面 */
        #incall-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; display: none; flex-direction: column; align-items: center; justify-content: center;
            z-index: 2000;
        }
        #call-duration { font-size: 24px; color: var(--accent); margin-top: 10px; font-family: monospace; }
    </style>
</head>
<body>

    <div class="screen" id="main-screen">
        <h2 style="letter-spacing: 4px;">NNM PHONE</h2>
        <div class="my-number-box">
            <div style="font-size: 12px; color: #888;">MY NUMBER</div>
            <div id="my-number">Connecting...</div>
        </div>
        <input type="text" id="target-id" placeholder="相手の番号 01-xxxx">
        <button id="call-btn" class="btn btn-call" onclick="makeCall()" disabled>準備中...</button>
        <p style="font-size: 10px; color: #666; margin-top: 20px;">※起動後、一度画面をタップしてください</p>
    </div>

    <div id="incoming-overlay">
        <div>
            <div style="color: var(--blue); font-weight: bold;">INCOMING CALL</div>
            <div class="caller-number" id="incoming-number">01-0000</div>
        </div>
        <div class="call-actions">
            <button class="circle-btn decline" onclick="declineCall()">✖</button>
            <button class="circle-btn answer" onclick="answerCall()">📞</button>
        </div>
    </div>

    <div id="incall-screen">
        <div style="color: #888;">ON CALL</div>
        <div id="active-target-number" style="font-size: 32px; font-weight: bold;">01-0000</div>
        <div id="call-duration">00:00</div>
        <button class="circle-btn decline" style="margin-top: 60px;" onclick="endCall()">✖</button>
    </div>

<script>
    let peer = null;
    let localStream = null;
    let currentCall = null;
    let timerInterval = null;
    let ringtone = new Audio("ring.mp3"); // 着信音ファイル
    ringtone.loop = true;

    const myPhoneNumber = localStorage.getItem('nnm_phone_num') || "01-" + Math.floor(Math.random() * 9000 + 1000);
    localStorage.setItem('nnm_phone_num', myPhoneNumber);

    window.onload = async () => {
        document.getElementById('my-number').innerText = myPhoneNumber;
        try {
            localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            initPeer();
        } catch(e) { alert("マイクを許可してください"); }
    };

    function initPeer() {
        peer = new Peer(myPhoneNumber, {
            debug: 1,
            config: { iceServers: [{ urls: "stun:stun.l.google.com:19302" }] }
        });

        peer.on('open', () => {
            const btn = document.getElementById('call-btn');
            btn.disabled = false;
            btn.innerText = "発信";
        });

        peer.on('call', call => {
            currentCall = call;
            startRinging(call.peer);
        });
    }

    // --- 着信時の挙動 ---
    function startRinging(number) {
        document.getElementById('incoming-number').innerText = number;
        document.getElementById('incoming-overlay').style.display = 'flex';
        
        // 着信音再生
        ringtone.play().catch(e => console.log("タップ待ち:", e));
        
        // バイブレーション (1秒振動、0.5秒停止の繰り返し)
        if (navigator.vibrate) {
            navigator.vibrate([1000, 500, 1000, 500, 1000]);
        }
    }

    function stopRinging() {
        ringtone.pause();
        ringtone.currentTime = 0;
        if (navigator.vibrate) navigator.vibrate(0);
    }

    // --- ボタン操作 ---
    function makeCall() {
        const target = document.getElementById('target-id').value.trim();
        if (!target) return;
        currentCall = peer.call(target, localStream);
        showInCallUI(target);
        setupStream(currentCall);
    }

    function answerCall() {
        stopRinging();
        currentCall.answer(localStream);
        document.getElementById('incoming-overlay').style.display = 'none';
        showInCallUI(currentCall.peer);
        setupStream(currentCall);
    }

    function declineCall() {
        stopRinging();
        currentCall.close();
        document.getElementById('incoming-overlay').style.display = 'none';
    }

    function endCall() {
        stopRinging();
        if (currentCall) currentCall.close();
        document.getElementById('incall-screen').style.display = 'none';
        stopTimer();
    }

    // --- 通話UIと通信 ---
    function showInCallUI(number) {
        document.getElementById('active-target-number').innerText = number;
        document.getElementById('incall-screen').style.display = 'flex';
        startTimer();
    }

    function setupStream(call) {
        call.on('stream', stream => {
            const audio = document.createElement('audio');
            audio.srcObject = stream;
            audio.autoplay = true;
            document.body.appendChild(audio);
        });
        call.on('close', endCall);
    }

    function startTimer() {
        let sec = 0;
        const el = document.getElementById('call-duration');
        timerInterval = setInterval(() => {
            sec++;
            let m = Math.floor(sec / 60).toString().padStart(2, '0');
            let s = (sec % 60).toString().padStart(2, '0');
            el.innerText = `${m}:${s}`;
        }, 1000);
    }

    function stopTimer() {
        clearInterval(timerInterval);
        document.getElementById('call-duration').innerText = "00:00";
    }
</script>
</body>
</html>
