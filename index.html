<!DOCTYPE HTML>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.5.2/peerjs.min.js"></script>
    <style>
        body { font-family: sans-serif; background: white; color: black; text-align: center; margin: 0; padding: 20px; }
        .status-tag { font-size: 12px; padding: 4px 8px; border-radius: 10px; background: #eee; }
        #my-number { font-size: 24px; font-weight: bold; color: #007aff; margin: 10px 0; }
        input { width: 80%; padding: 15px; font-size: 18px; border: 1px solid #ccc; border-radius: 10px; margin: 20px 0; }
        
        /* 画面切り替え用 */
        .page { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:white; z-index: 100; flex-direction: column; align-items: center; justify-content: center; }
        #main-page { display: flex; position: static; }

        .btn { width: 80px; height: 80px; border-radius: 50%; border: none; color: white; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .btn-call { background: #34c759; }
        .btn-end { background: #ff3b30; }
        
        .material-symbols-outlined { font-size: 35px; }
    </style>
</head>
<body onclick="setupAudioOnce()">

    <div id="main-page">
        <h2>NNM PHONE</h2>
        <div class="status-tag" id="conn-status">接続中...</div>
        <div id="my-number">----</div>
        <input type="text" id="target-id" placeholder="相手の番号を入力">
        <button class="btn btn-call" style="margin: 0 auto;" onclick="makeCall()">
            <span class="material-symbols-outlined">call</span>
        </button>
        <p style="color: gray; font-size: 11px; margin-top: 30px;">※起動後、ここを一度タップしてください</p>
    </div>

    <div id="call-page" class="page">
        <div id="call-label" style="color: #007aff; margin-bottom: 10px;">通話中</div>
        <div id="active-num" style="font-size: 32px; margin-bottom: 20px;">01-0000</div>
        <div id="timer" style="font-size: 20px; margin-bottom: 40px; color: #34c759;">00:00</div>
        
        <div style="display: flex; gap: 40px;">
            <button id="answer-btn" class="btn btn-call" onclick="answerCall()">
                <span class="material-symbols-outlined">call</span>
            </button>
            <button class="btn btn-end" onclick="endCall()">
                <span class="material-symbols-outlined">call_end</span>
            </button>
        </div>
    </div>

<script>
    let peer, localStream, currentCall, timerInterval;
    const ringtone = new Audio("ring.mp3");
    const dialtone = new Audio("dialtone.mp3");
    ringtone.loop = dialtone.loop = true;

    let myId = localStorage.getItem('nnm_id') || "01-" + Math.floor(Math.random()*9000+1000);
    localStorage.setItem('nnm_id', myId);

    // 1. 起動時に即座に実行
    (async function init() {
        document.getElementById('my-number').innerText = myId;
        try {
            localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            
            // PeerJS接続
            peer = new Peer(myId, {
                debug: 2,
                config: { iceServers: [{ urls: "stun:stun.l.google.com:19302" }] }
            });

            peer.on('open', (id) => {
                document.getElementById('conn-status').innerText = "オンライン";
                document.getElementById('conn-status').style.background = "#e1f5fe";
            });

            // 【最重要】ここが着信の心臓部
            peer.on('call', call => {
                console.log("着信アリ:", call.peer);
                currentCall = call;
                showCallUI(call.peer, "着信中...", true);
                ringtone.play().catch(e => console.log("再生失敗:", e));
            });

            peer.on('error', err => {
                alert("エラー: " + err.type);
                if(err.type === 'unavailable-id') location.reload();
            });

        } catch(e) {
            alert("マイク許可が必要です");
        }
    })();

    // 最初の1回目のタップで音を「解禁」する
    function setupAudioOnce() {
        ringtone.play().then(() => { ringtone.pause(); ringtone.currentTime = 0; });
        dialtone.play().then(() => { dialtone.pause(); dialtone.currentTime = 0; });
        console.log("音声を解禁しました");
    }

    function makeCall() {
        const target = document.getElementById('target-id').value;
        if(!target) return;
        
        dialtone.play();
        currentCall = peer.call(target, localStream);
        showCallUI(target, "発信中...", false);
        
        setupStream(currentCall);
    }

    function answerCall() {
        ringtone.pause();
        currentCall.answer(localStream);
        document.getElementById('answer-btn').style.display = 'none';
        setupStream(currentCall);
    }

    function setupStream(call) {
        call.on('stream', stream => {
            dialtone.pause();
            document.getElementById('call-label').innerText = "通話中";
            document.getElementById('timer').style.display = 'block';
            
            const audio = document.createElement('audio');
            audio.srcObject = stream;
            audio.autoplay = true;
            document.body.appendChild(audio);
            
            startTimer();
        });
        call.on('close', endCall);
    }

    function endCall() {
        ringtone.pause(); dialtone.pause();
        if(currentCall) currentCall.close();
        document.getElementById('call-page').style.display = 'none';
        clearInterval(timerInterval);
    }

    function showCallUI(num, label, incoming) {
        document.getElementById('active-num').innerText = num;
        document.getElementById('call-label').innerText = label;
        document.getElementById('call-page').style.display = 'flex';
        document.getElementById('answer-btn').style.display = incoming ? 'flex' : 'none';
        document.getElementById('timer').style.display = 'none';
    }

    function startTimer() {
        let sec = 0;
        clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            sec++;
            let m = Math.floor(sec/60).toString().padStart(2,'0');
            let s = (sec%60).toString().padStart(2,'0');
            document.getElementById('timer').innerText = `${m}:${s}`;
        }, 1000);
    }
</script>
</body>
</html>
